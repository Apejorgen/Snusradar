<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f13;--bg2:#13151b;--bg3:#1a1d26;--bg4:#222630;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f2f0e8;--text2:#8c8a82;--text3:#4a4846;
  --g:#4ecb9e;--gd:#0a4a36;--gbg:rgba(78,203,158,0.12);--gbg2:rgba(78,203,158,0.2);
  --a:#f0a030;--abg:rgba(240,160,48,0.12);
  --r:#e84848;--rbg:rgba(232,72,72,0.12);
  --b:#4a9eff;--bbg:rgba(74,158,255,0.12);
  --tab-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;font-size:15px}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none}
input,textarea{font-family:'DM Sans',sans-serif}

/* ── LOADING ── */
#loader{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.ld-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;letter-spacing:-1px}
.ld-logo span{color:var(--g)}
.ld-sub{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px}
.spin{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--g);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── AUTH ── */
#authWrap{position:fixed;inset:0;background:var(--bg);z-index:8000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
#authWrap::before{content:'';position:fixed;width:500px;height:500px;background:radial-gradient(circle,rgba(78,203,158,0.07) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.auth-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:32px 28px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:18px;position:relative;z-index:1}
.auth-logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;text-align:center;letter-spacing:-0.5px}
.auth-logo span{color:var(--g)}
.auth-tagline{text-align:center;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px;margin-top:-12px}
.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:3px;gap:3px}
.tab-btn{flex:1;padding:9px;border-radius:8px;font-size:13px;color:var(--text3);transition:all .15s}
.tab-btn.on{background:var(--bg4);color:var(--text)}
.fgroup{display:flex;flex-direction:column;gap:6px}
.flabel{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:.7px;text-transform:uppercase}
.finput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.finput:focus{border-color:var(--g)}
.finput::placeholder{color:var(--text3)}
.abtn{width:100%;padding:14px;border-radius:10px;background:var(--g);color:#041a0f;font-size:15px;font-weight:500;transition:opacity .15s}
.abtn:active{opacity:.8}
.abtn:disabled{opacity:.5}
.aerr{font-size:12px;color:var(--r);background:var(--rbg);padding:9px 12px;border-radius:8px;display:none;line-height:1.5}

/* ── APP SHELL ── */
#shell{position:fixed;inset:0;display:none;flex-direction:column}

/* ── MAP (fills everything minus tab bar) ── */
#mapTab{position:absolute;inset:0;bottom:calc(var(--tab-h) + var(--safe-bottom));z-index:1}
#gmap{width:100%;height:100%}

/* ── TOP HUD ── */
.hud{position:absolute;top:0;left:0;right:0;z-index:20;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;pointer-events:none}
.hud-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.5px;background:var(--bg);border-radius:10px;padding:6px 14px;border:1px solid var(--border2);pointer-events:all}
.hud-logo span{color:var(--g)}
.hud-right{display:flex;gap:8px;pointer-events:all}
.hud-btn{width:38px;height:38px;border-radius:50%;background:var(--bg);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;position:relative}
.hud-btn:active{background:var(--bg3)}
.ping-badge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--r);font-size:9px;font-family:'DM Mono',monospace;color:#fff;display:none;align-items:center;justify-content:center;border:2px solid var(--bg)}
.ping-badge.on{display:flex;animation:ping-pulse 1.5s infinite}
@keyframes ping-pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,72,72,.5)}50%{box-shadow:0 0 0 6px rgba(232,72,72,0)}}

/* ── GPS BTN ── */
.gps-fab{position:absolute;bottom:calc(var(--tab-h) + var(--safe-bottom) + 16px);right:14px;z-index:20;width:44px;height:44px;border-radius:50%;background:var(--bg);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.gps-fab.on{background:var(--gbg);border-color:var(--g)}
.gps-fab:active{transform:scale(.95)}

/* ── FRIEND SHEET (slides up from bottom when tapping pin) ── */
.fsheet{
  position:absolute;left:0;right:0;bottom:calc(var(--tab-h) + var(--safe-bottom));
  background:var(--bg2);border-top:1px solid var(--border2);
  border-radius:20px 20px 0 0;z-index:30;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0);
  padding-bottom:8px;
}
.fsheet.open{transform:translateY(0)}
.fsheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0}
.fsheet-inner{padding:16px 18px 12px}
.fsheet-top{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.fsheet-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;flex-shrink:0;font-family:'DM Mono',monospace;position:relative}
.fsheet-av .sdot{position:absolute;bottom:2px;right:2px;width:13px;height:13px;border-radius:50%;border:2.5px solid var(--bg2)}
.sdot.available{background:var(--g)}
.sdot.maybe{background:var(--a)}
.sdot.needsnus{background:var(--b)}
.sdot.empty{background:var(--r)}
.sdot.offline{background:var(--text3)}
.fsheet-name{font-size:18px;font-weight:500}
.fsheet-dist{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:2px}
.stat-pill{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:500;margin-bottom:14px}
.stat-pill.available{background:var(--gbg);color:var(--g)}
.stat-pill.maybe{background:var(--abg);color:var(--a)}
.stat-pill.needsnus{background:var(--bbg);color:var(--b)}
.stat-pill.empty{background:var(--rbg);color:var(--r)}
.stat-pill.offline{background:var(--bg3);color:var(--text3)}
.stat-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.brands-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.brand-chip{font-size:12px;padding:5px 11px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);font-family:'DM Mono',monospace;background:var(--bg3)}
.fsheet-actions{display:flex;gap:10px}
.act-btn{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:500;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.act-btn:active{transform:scale(.97)}
.act-ping{background:var(--g);color:#041a0f}
.act-need{background:var(--bbg);color:var(--b);border:1px solid var(--b)}
.act-ping.sent{background:var(--gbg);color:var(--g);border:1px solid var(--g)}

/* ── TAB BAR ── */
.tabbar{
  position:absolute;bottom:0;left:0;right:0;z-index:100;
  height:calc(var(--tab-h) + var(--safe-bottom));
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:flex-start;padding-top:4px;
  padding-bottom:var(--safe-bottom);
}
.tbtab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;color:var(--text3);transition:color .15s;position:relative}
.tbtab.on{color:var(--g)}
.tbtab-icon{font-size:22px;line-height:1}
.tbtab-label{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:.5px}
.tbtab-dot{position:absolute;top:6px;right:calc(50% - 18px);width:7px;height:7px;border-radius:50%;background:var(--r);display:none;border:1.5px solid var(--bg2)}
.tbtab-dot.on{display:block}

/* ── PANEL VIEWS (friends, profile) ── */
.panel{position:absolute;inset:0;bottom:calc(var(--tab-h) + var(--safe-bottom));background:var(--bg);z-index:50;display:none;flex-direction:column;overflow:hidden}
.panel.open{display:flex}
.panel-head{padding:16px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}
.panel-body::-webkit-scrollbar{display:none}

/* FRIENDS LIST */
.add-friend-btn{width:100%;padding:13px;border-radius:12px;border:1.5px dashed var(--border2);color:var(--text3);font-size:14px;margin-bottom:14px;transition:all .15s}
.add-friend-btn:active{border-color:var(--g);color:var(--g);background:var(--gbg)}
.fcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:13px}
.fcard-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;flex-shrink:0;font-family:'DM Mono',monospace;position:relative}
.fcard-info{flex:1;min-width:0}
.fcard-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fcard-brands{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fcard-badge{font-size:11px;font-family:'DM Mono',monospace;padding:4px 9px;border-radius:20px;flex-shrink:0}
.fcard-badge.available{background:var(--gbg);color:var(--g)}
.fcard-badge.maybe{background:var(--abg);color:var(--a)}
.fcard-badge.needsnus{background:var(--bbg);color:var(--b)}
.fcard-badge.empty{background:var(--rbg);color:var(--r)}
.fcard-badge.offline{background:var(--bg3);color:var(--text3)}
.empty-friends{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;line-height:2.2;font-family:'DM Mono',monospace}

/* PROFILE */
.my-av-row{display:flex;align-items:center;gap:16px;padding:16px;background:var(--bg2);border-radius:14px;margin-bottom:18px;border:1px solid var(--border)}
.my-av{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;font-family:'DM Mono',monospace;flex-shrink:0}
.my-av-name{font-size:18px;font-weight:500}
.my-av-email{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:3px}
.section-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;margin-top:18px}
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;min-height:50px;cursor:text}
.chips-wrap:focus-within{border-color:var(--g)}
.chip{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 11px;font-size:13px;font-family:'DM Mono',monospace;color:var(--text2)}
.chip-x{color:var(--text3);font-size:15px;line-height:1;padding:0 2px}
.chip-x:active{color:var(--r)}
.chip-inp{flex:1;min-width:100px;background:none;border:none;outline:none;color:var(--text);font-size:14px;padding:2px 4px}
.chip-inp::placeholder{color:var(--text3)}
.avail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.avail-opt{padding:13px 10px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);font-size:13px;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:5px}
.avail-opt:active{transform:scale(.97)}
.avail-opt.sel-available{background:var(--gbg);border-color:var(--g);color:var(--g)}
.avail-opt.sel-maybe{background:var(--abg);border-color:var(--a);color:var(--a)}
.avail-opt.sel-needsnus{background:var(--bbg);border-color:var(--b);color:var(--b)}
.avail-opt.sel-empty{background:var(--rbg);border-color:var(--r);color:var(--r)}
.avail-icon{font-size:22px}
.stock-wrap{display:flex;flex-direction:column;gap:6px}
.stock-sl{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;background:var(--bg3);outline:none}
.stock-sl::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--g);border:3px solid var(--bg2);box-shadow:0 2px 8px rgba(0,0,0,.4)}
.stock-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);font-family:'DM Mono',monospace}
.save-btn{width:100%;padding:15px;border-radius:12px;background:var(--g);color:#041a0f;font-size:15px;font-weight:500;margin-top:20px;transition:opacity .15s}
.save-btn:active{opacity:.8}
.signout-btn{width:100%;padding:13px;border-radius:12px;border:1px solid var(--border);color:var(--text3);font-size:14px;margin-top:10px;transition:all .15s}
.signout-btn:active{border-color:var(--r);color:var(--r);background:var(--rbg)}
.saved-flash{text-align:center;color:var(--g);font-size:13px;font-family:'DM Mono',monospace;opacity:0;transition:opacity .3s;margin-top:6px}
.saved-flash.on{opacity:1}

/* ── MODALS ── */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end;justify-content:center;padding-bottom:var(--safe-bottom)}
.modal-wrap.open{display:flex}
.modal{background:var(--bg2);border-top:1px solid var(--border2);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px;display:flex;flex-direction:column;gap:14px}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:-10px auto 6px}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800}
.modal-sub{font-size:13px;color:var(--text2);margin-top:-8px}
.merr{font-size:13px;color:var(--r);background:var(--rbg);padding:9px 12px;border-radius:10px;display:none}
.found-row{display:none;padding:12px;background:var(--bg3);border-radius:12px;border:1px solid var(--border2);gap:12px;align-items:center}
.found-row.on{display:flex}
.found-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;background:var(--gd);color:var(--g);font-family:'DM Mono',monospace;flex-shrink:0}
.found-name{font-size:15px;font-weight:500}
.found-email{font-size:12px;color:var(--text2);font-family:'DM Mono',monospace}
.share-row{display:flex;gap:8px;background:var(--bg3);border-radius:10px;padding:10px 12px;border:1px solid var(--border);align-items:center}
.share-url{flex:1;font-size:11px;font-family:'DM Mono',monospace;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{padding:6px 13px;border-radius:8px;border:1px solid var(--border2);color:var(--text2);font-size:12px;flex-shrink:0;transition:all .15s}
.copy-btn:active,.copy-btn.copied{border-color:var(--g);color:var(--g);background:var(--gbg)}
.modal-actions{display:flex;gap:8px}
.mbtn-c{flex:1;padding:13px;border-radius:12px;border:1px solid var(--border);color:var(--text2);font-size:14px;transition:all .15s}
.mbtn-c:active{border-color:var(--border2);color:var(--text)}
.mbtn-p{flex:1;padding:13px;border-radius:12px;background:var(--g);color:#041a0f;font-size:14px;font-weight:500;transition:opacity .15s}
.mbtn-p:active{opacity:.8}
.mbtn-p:disabled{opacity:.5}

/* ── TOAST ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--bg2);border:1px solid var(--g);border-radius:14px;padding:12px 20px;z-index:9000;white-space:nowrap;transition:transform .35s cubic-bezier(.34,1.56,.64,1);font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.on{transform:translateX(-50%) translateY(0)}
.toast-name{color:var(--g);font-weight:500}

/* ── REMOVE SHEET ── */
.ctx-sheet{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:flex-end;justify-content:center;padding-bottom:var(--safe-bottom)}
.ctx-sheet.open{display:flex}
.ctx-inner{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:8px 0 8px}
.ctx-item{padding:16px 20px;font-size:16px;text-align:center;transition:background .1s}
.ctx-item:active{background:var(--bg3)}
.ctx-item.danger{color:var(--r)}
.ctx-item.cancel{color:var(--text2);border-top:1px solid var(--border);margin-top:4px}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="ld-logo">Snus<span>Buddy</span></div>
  <div class="ld-sub">loading...</div>
  <div class="spin"></div>
</div>

<!-- AUTH -->
<div id="authWrap">
  <div class="auth-card">
    <div class="auth-logo">Snus<span>Buddy</span></div>
    <div class="auth-tagline">find friends. find snus.</div>
    <div class="tabs">
      <button class="tab-btn on" onclick="authTab('login')">Sign in</button>
      <button class="tab-btn" onclick="authTab('register')">Sign up</button>
    </div>
    <div id="authForm"></div>
  </div>
</div>

<!-- SHELL -->
<div id="shell">

  <!-- MAP TAB -->
  <div id="mapTab">
    <div id="gmap"></div>

    <!-- HUD -->
    <div class="hud">
      <div class="hud-logo">Snus<span>Buddy</span></div>
      <div class="hud-right">
        <button class="hud-btn" onclick="openAddModal()" title="Add friend">＋
        </button>
        <button class="hud-btn" id="notifBtn" onclick="clearPingBadge()">
          🔔
          <div class="ping-badge" id="pingBadge">!</div>
        </button>
      </div>
    </div>

    <!-- GPS FAB -->
    <button class="gps-fab" id="gpsFab" onclick="recenter()">📍</button>

    <!-- FRIEND SHEET -->
    <div class="fsheet" id="fsheet">
      <div class="fsheet-handle"></div>
      <div class="fsheet-inner">
        <div class="fsheet-top">
          <div class="fsheet-av" id="fsAv"><div class="sdot" id="fsDot"></div></div>
          <div>
            <div class="fsheet-name" id="fsName"></div>
            <div class="fsheet-dist" id="fsDist"></div>
          </div>
        </div>
        <div class="stat-pill" id="fsStat"><div class="stat-dot"></div><span id="fsStatTxt"></span></div>
        <div class="brands-row" id="fsBrands"></div>
        <div class="fsheet-actions">
          <button class="act-btn act-ping" id="fsPing" onclick="doPing()">📡 Ping for snus</button>
          <button class="act-btn act-need" id="fsNeed" onclick="doNeedSnus()">🙏 Need snus</button>
        </div>
      </div>
    </div>
  </div>

  <!-- FRIENDS PANEL -->
  <div class="panel" id="friendsPanel">
    <div class="panel-head">
      <div class="panel-title">Friends</div>

  <div class="ctx-inner">
    <div class="ctx-item danger" id="ctxRemove" onclick="confirmRemove()">Remove friend</div>
    <div class="ctx-item cancel" onclick="closeCtx()">Cancel</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">📡 <span class="toast-name" id="toastName"></span> wants snus!</div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let auth, db, gMap;
let me = null, myData = null;
let friends = {};
let fUnsubs = {}, myUnsub = null, pingUnsub = null;
let gpsWatch = null, selUid = null, ctxUid = null;
let pBrands = [], pAvail = 'empty';
let markers = {}, myPin = null;
let activeTab = 'map';

const COLORS = [
  {bg:'#0a4a36',fg:'#4ecb9e'},{bg:'#14406e',fg:'#4a9eff'},
  {bg:'#6a3208',fg:'#f0a030'},{bg:'#6b2040',fg:'#f07ab0'},
  {bg:'#3a3280',fg:'#9a94e8'},{bg:'#284a0a',fg:'#7ec844'},
  {bg:'#7a1e1e',fg:'#f08080'},{bg:'#3a3836',fg:'#c8c6be'},
];
const AVAIL_LABELS = {available:'Has snus 🟢',maybe:'Running low 🟡',needsnus:'Needs snus 🔵',empty:'No snus 🔴',offline:'Offline ⚫'};
const AVAIL_TEXTS = {available:'Has snus to share!',maybe:'Running low',needsnus:'Needs snus!',empty:'Out of snus',offline:'Offline'};

function colorFor(uid=''){let h=0;for(let i=0;i<uid.length;i++)h=(h*31+uid.charCodeAt(i))&0xffffffff;return COLORS[Math.abs(h)%COLORS.length]}
function inits(n=''){return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()||'??'}

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
window.addEventListener('load', () => {
  loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js')
  .then(()=>loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js'))
  .then(()=>loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js'))
  .then(()=>loadScript(`https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}`))
  .then(()=>{
    firebase.initializeApp(FB);
    auth = firebase.auth();
    db = firebase.firestore();
    firebase.auth().onAuthStateChanged(user => {
      if(user){me=user;initApp();}
      else{me=null;showLoader(false);showAuth();teardown();}
    });
  }).catch(e=>{showLoader(false);alert('Load error: '+e.message);});
});

function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
}

async function initApp(){
  showLoader(true);
  try{
    let snap = await db.collection('users').doc(me.uid).get();
    if(!snap.exists){
      await db.collection('users').doc(me.uid).set({
        uid:me.uid,displayName:me.displayName||'New User',email:me.email,
        brands:[],availability:'empty',stock:0,location:null,friends:[],
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      snap = await db.collection('users').doc(me.uid).get();
    }
    myData = snap.data();
    pBrands=[...(myData.brands||[])];
    pAvail=myData.availability||'empty';
    document.getElementById('authWrap').style.display='none';
    document.getElementById('shell').style.display='flex';
    startMyListener();
    await loadFriends();
    startPingListener();
    startGPS();
    setTimeout(()=>{initMap();updateMyPin();Object.entries(friends).forEach(([u,d])=>updatePin(u,d));},150);
  }catch(e){alert('Error: '+e.message);}
  showLoader(false);
}

function teardown(){
  if(myUnsub){myUnsub();myUnsub=null;}
  if(pingUnsub){pingUnsub();pingUnsub=null;}
  Object.values(fUnsubs).forEach(fn=>fn());
  fUnsubs={};friends={};
  if(gpsWatch){navigator.geolocation.clearWatch(gpsWatch);gpsWatch=null;}
  markers={};myPin=null;gMap=null;
}

// ═══════════════════════════════════════
// REAL-TIME LISTENERS
// ═══════════════════════════════════════
function startMyListener(){
  if(myUnsub)myUnsub();
  myUnsub = db.collection('users').doc(me.uid).onSnapshot(snap=>{
    if(!snap.exists)return;
    myData=snap.data();
    pBrands=[...(myData.brands||[])];
    pAvail=myData.availability||'empty';
    updateMyPin();
  });
}

function startPingListener(){
  if(pingUnsub)pingUnsub();
  pingUnsub = db.collection('pings')
    .where('to','==',me.uid).where('read','==',false)
    .onSnapshot(snap=>{
      snap.docChanges().forEach(ch=>{
        if(ch.type==='added'){
          showToast(ch.doc.data().fromName, ch.doc.data().type||'ping');
          ch.doc.ref.update({read:true});
          showPingBadge();
        }
      });
    });
}

async function loadFriends(){
  if(!myData?.friends?.length){renderFriendsList();return;}
  for(const uid of myData.friends) startFriendListener(uid);
}

function startFriendListener(uid){
  if(fUnsubs[uid])return;
  fUnsubs[uid]=db.collection('users').doc(uid).onSnapshot(snap=>{
    if(!snap.exists)return;
    friends[uid]=snap.data();
    renderFriendsList();
    updatePin(uid,snap.data());
    if(selUid===uid)updateFsheet(uid);
  });
}

function stopFriendListener(uid){
  if(fUnsubs[uid]){fUnsubs[uid]();delete fUnsubs[uid];}
  delete friends[uid];
  if(markers[uid]){markers[uid].setMap(null);delete markers[uid];}
}

// ═══════════════════════════════════════
// GPS
// ═══════════════════════════════════════
function startGPS(){
  if(!navigator.geolocation)return;
  gpsWatch=navigator.geolocation.watchPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    db.collection('users').doc(me.uid).update({
      location:{lat,lng},lastSeen:firebase.firestore.FieldValue.serverTimestamp()
    });
    if(myData)myData.location={lat,lng};
    updateMyPin();
    document.getElementById('gpsFab').classList.add('on');
  },err=>{
    document.getElementById('gpsFab').classList.remove('on');
  },{enableHighAccuracy:true,maximumAge:8000,timeout:15000});
}

window.recenter=function(){
  if(gMap&&myData?.location){
    gMap.panTo({lat:myData.location.lat,lng:myData.location.lng});
    gMap.setZoom(15);
  }
};

// ═══════════════════════════════════════
// MAP
// ═══════════════════════════════════════
function initMap(){
  const el=document.getElementById('gmap');
  if(!el||gMap)return;
  gMap=new google.maps.Map(el,{
    center:{lat:69.6492,lng:18.9553},
    zoom:14,
    styles:darkStyle(),
    disableDefaultUI:true,
    gestureHandling:'greedy',
  });
  // Close sheet when tapping map
  gMap.addListener('click',()=>closeFsheet());
}

function updateMyPin(){
  if(!gMap||!myData?.location)return;
  const pos={lat:myData.location.lat,lng:myData.location.lng};
  const c=colorFor(me.uid);
  const icon=makeIcon(c.bg,c.fg,inits(myData.displayName),true,'me');
  if(!myPin){myPin=new google.maps.Marker({position:pos,map:gMap,icon,zIndex:99});}
  else{myPin.setPosition(pos);myPin.setIcon(icon);}
}

function updatePin(uid,data){
  if(!gMap)return;
  if(!data.location){
    if(markers[uid]){markers[uid].setMap(null);delete markers[uid];}return;
  }
  const c=colorFor(uid);
  const isSel=selUid===uid;
  const icon=makeIcon(c.bg,c.fg,inits(data.displayName),isSel,data.availability||'offline');
  const pos={lat:data.location.lat,lng:data.location.lng};
  if(!markers[uid]){
    markers[uid]=new google.maps.Marker({position:pos,map:gMap,icon,zIndex:isSel?98:10});
    markers[uid].addListener('click',()=>{
      selUid=uid;
      updateFsheet(uid);
      openFsheet();
      gMap.panTo(pos);
      refreshMarkers();
    });
  }else{
    markers[uid].setPosition(pos);
    markers[uid].setIcon(icon);
    markers[uid].setZIndex(isSel?98:10);
  }
}

function refreshMarkers(){Object.entries(friends).forEach(([u,d])=>updatePin(u,d));}

function makeIcon(bg,fg,label,big,type){
  const s=big?46:38;
  const ring=type==='me'?`<circle cx="${s/2}" cy="${s/2}" r="${s/2-2}" fill="none" stroke="${fg}" stroke-width="2" stroke-dasharray="3,2" opacity="0.6"/>`:'';
  const dotColors={available:'#4ecb9e',maybe:'#f0a030',needsnus:'#4a9eff',empty:'#e84848',offline:'#4a4846'};
  const dot=type!=='me'?`<circle cx="${s-8}" cy="8" r="5" fill="${dotColors[type]||'#4a4846'}" stroke="${bg}" stroke-width="2"/>`:'';
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}"><circle cx="${s/2}" cy="${s/2}" r="${s/2-1}" fill="${bg}"/>${ring}<text x="${s/2}" y="${s/2+4}" text-anchor="middle" font-family="DM Mono,monospace" font-size="${big?12:10}" font-weight="500" fill="${fg}">${label}</text>${dot}</svg>`;
  return{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(s,s),anchor:new google.maps.Point(s/2,s/2)};
}

// ═══════════════════════════════════════
// FRIEND SHEET
// ═══════════════════════════════════════
function openFsheet(){document.getElementById('fsheet').classList.add('open');}
function closeFsheet(){
  document.getElementById('fsheet').classList.remove('open');
  selUid=null;
  refreshMarkers();
}

function updateFsheet(uid){
  const d=friends[uid];if(!d)return;
  const c=colorFor(uid);
  const av=d.availability||'offline';
  const avEl=document.getElementById('fsAv');
  avEl.textContent=inits(d.displayName);
  avEl.style.background=c.bg;avEl.style.color=c.fg;
  // re-add dot
  const dot=document.createElement('div');dot.className='sdot '+av;
  avEl.textContent=inits(d.displayName);
  avEl.appendChild(dot);
  document.getElementById('fsName').textContent=d.displayName;
  // Distance
  if(myData?.location&&d.location){
    const km=calcDist(myData.location.lat,myData.location.lng,d.location.lat,d.location.lng);
    document.getElementById('fsDist').textContent=km<1?(Math.round(km*1000)+'m away'):(km.toFixed(1)+'km away');
  }else{
    document.getElementById('fsDist').textContent=d.location?'Location known':'No location';
  }
  const st=document.getElementById('fsStat');
  st.className='stat-pill '+av;
  document.getElementById('fsStatTxt').textContent=AVAIL_TEXTS[av];
  document.getElementById('fsBrands').innerHTML=(d.brands||[]).map(b=>`<div class="brand-chip">${b}</div>`).join('')||'<span style="color:var(--text3);font-size:13px">No brands set</span>';
  // Reset ping btn
  const pb=document.getElementById('fsPing');
  pb.className='act-btn act-ping';pb.textContent='📡 Ping for snus';
}

function calcDist(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

window.doPing=async function(){
  if(!selUid)return;
  try{
    await db.collection('pings').add({from:me.uid,fromName:myData.displayName,to:selUid,type:'ping',timestamp:firebase.firestore.FieldValue.serverTimestamp(),read:false});
    const pb=document.getElementById('fsPing');
    pb.className='act-btn act-ping sent';pb.textContent='✓ Pinged!';
    setTimeout(()=>{pb.className='act-btn act-ping';pb.textContent='📡 Ping for snus';},4000);
  }catch(e){console.error(e);}
};

window.doNeedSnus=async function(){
  if(!selUid)return;
  try{
    await db.collection('pings').add({from:me.uid,fromName:myData.displayName,to:selUid,type:'need',timestamp:firebase.firestore.FieldValue.serverTimestamp(),read:false});
    const nb=document.getElementById('fsNeed');
    nb.style.opacity='.5';nb.textContent='✓ Request sent!';
    setTimeout(()=>{nb.style.opacity='1';nb.textContent='🙏 Need snus';},4000);
  }catch(e){console.error(e);}
};

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
window.showTab=function(tab){
  activeTab=tab;
  ['map','friends','profile'].forEach(t=>{
    document.getElementById('tb-'+t).classList.toggle('on',t===tab);
  });
  document.getElementById('friendsPanel').classList.toggle('open',tab==='friends');
  document.getElementById('profilePanel').classList.toggle('open',tab==='profile');
  if(tab==='friends'){renderFriendsList();document.getElementById('friendsDot').classList.remove('on');}
  if(tab==='profile')renderProfile();
  if(tab==='map')setTimeout(()=>{if(gMap)google.maps.event.trigger(gMap,'resize');},80);
};

// ═══════════════════════════════════════
// FRIENDS LIST
// ═══════════════════════════════════════
function renderFriendsList(){
  const el=document.getElementById('friendsList');if(!el)return;
  const uids=myData?.friends||[];
  let html=`<button class="add-friend-btn" onclick="openAddModal()">＋ Add a friend</button>`;
  if(!uids.length){
    html+=`<div class="empty-friends">No friends yet.\nAdd someone to see\nthem on the map! 📍</div>`;
    el.innerHTML=html;return;
  }
  html+=uids.map(uid=>{
    const d=friends[uid];if(!d)return'';
    const c=colorFor(uid);const av=d.availability||'offline';
    return`<div class="fcard" oncontextmenu="openCtx('${uid}');return false;" ontouchstart="startLongPress('${uid}')" ontouchend="cancelLongPress()">
      <div class="fcard-av" style="background:${c.bg};color:${c.fg}">${inits(d.displayName)}<div class="sdot ${av}" style="position:absolute;bottom:1px;right:1px;border-color:var(--bg2)"></div></div>
      <div class="fcard-info">
        <div class="fcard-name">${d.displayName}</div>
        <div class="fcard-brands">${(d.brands||[]).join(', ')||'No brands set'}</div>
      </div>
      <div class="fcard-badge ${av}">${{available:'✓ Has',maybe:'Low',needsnus:'Needs',empty:'None',offline:'Away'}[av]||'?'}</div>
    </div>`;
  }).join('');
  el.innerHTML=html;
}

// Long press to remove
let lpTimer=null;
window.startLongPress=function(uid){lpTimer=setTimeout(()=>openCtx(uid),600);};
window.cancelLongPress=function(){if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}};
window.openCtx=function(uid){ctxUid=uid;document.getElementById('ctxSheet').classList.add('open');};
window.closeCtx=function(){document.getElementById('ctxSheet').classList.remove('open');ctxUid=null;};
window.confirmRemove=async function(){
  if(!ctxUid)return;
  closeCtx();
  await db.collection('users').doc(me.uid).update({friends:firebase.firestore.FieldValue.arrayRemove(ctxUid)});
  stopFriendListener(ctxUid);
  if(myData.friends)myData.friends=myData.friends.filter(f=>f!==ctxUid);
  if(selUid===ctxUid)closeFsheet();
  renderFriendsList();
};

// ═══════════════════════════════════════
// ADD FRIEND MODAL
// ═══════════════════════════════════════
let foundUser=null;
window.openAddModal=function(){
  foundUser=null;
  document.getElementById('searchEmail').value='';
  document.getElementById('addErr').style.display='none';
  document.getElementById('foundRow').classList.remove('on');
  document.getElementById('searchBtn').textContent='Search';
  document.getElementById('searchBtn').onclick=doSearch;
  document.getElementById('shareUrl').textContent=location.href.split('?')[0]+'?invite='+me.uid;
  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('searchEmail').focus(),200);
};
window.closeAddModal=()=>document.getElementById('addModal').classList.remove('open');
window.clearFound=()=>{
  document.getElementById('foundRow').classList.remove('on');
  document.getElementById('addErr').style.display='none';
  foundUser=null;
  document.getElementById('searchBtn').textContent='Search';
  document.getElementById('searchBtn').onclick=doSearch;
};
window.doSearch=async function(){
  const email=document.getElementById('searchEmail').value.trim();
  if(!email)return;
  const errEl=document.getElementById('addErr');errEl.style.display='none';
  const btn=document.getElementById('searchBtn');btn.disabled=true;btn.textContent='Searching…';
  try{
    const snap=await db.collection('users').where('email','==',email.toLowerCase()).get();
    if(snap.empty){errEl.textContent='No user found with that email.';errEl.style.display='block';btn.disabled=false;btn.textContent='Search';return;}
    const data=snap.docs[0].data();
    if(data.uid===me.uid){errEl.textContent="That's you!";errEl.style.display='block';btn.disabled=false;btn.textContent='Search';return;}
    if(myData?.friends?.includes(data.uid)){errEl.textContent='Already a friend!';errEl.style.display='block';btn.disabled=false;btn.textContent='Search';return;}
    foundUser=data;
    const c=colorFor(data.uid);
    const fav=document.getElementById('foundAv');
    fav.textContent=inits(data.displayName);fav.style.background=c.bg;fav.style.color=c.fg;
    document.getElementById('foundName').textContent=data.displayName;
    document.getElementById('foundEmail').textContent=data.email;
    document.getElementById('foundRow').classList.add('on');
    btn.textContent='Add friend';btn.onclick=doAddFound;
  }catch(e){errEl.textContent=e.message;errEl.style.display='block';}
  btn.disabled=false;
};
async function doAddFound(){
  if(!foundUser)return;
  const btn=document.getElementById('searchBtn');btn.disabled=true;btn.textContent='Adding…';
  try{
    await db.collection('users').doc(me.uid).update({friends:firebase.firestore.FieldValue.arrayUnion(foundUser.uid)});
    if(!myData.friends)myData.friends=[];
    myData.friends.push(foundUser.uid);
    startFriendListener(foundUser.uid);
    closeAddModal();renderFriendsList();
    document.getElementById('friendsDot').classList.add('on');
  }catch(e){document.getElementById('addErr').textContent=e.message;document.getElementById('addErr').style.display='block';}
  btn.disabled=false;
}
window.copyLink=function(){
  navigator.clipboard.writeText(location.href.split('?')[0]+'?invite='+me.uid).then(()=>{
    const b=document.getElementById('copyBtn');b.textContent='Copied!';b.classList.add('copied');
    setTimeout(()=>{b.textContent='Copy';b.classList.remove('copied');},2000);
  });
};

// ═══════════════════════════════════════
// PROFILE
// ═══════════════════════════════════════
function renderProfile(){
  if(!myData)return;
  const el=document.getElementById('profileBody');if(!el)return;
  const c=colorFor(me.uid);
  el.innerHTML=`
    <div class="my-av-row">
      <div class="my-av" style="background:${c.bg};color:${c.fg}">${inits(myData.displayName)}</div>
      <div>
        <div class="my-av-name" id="pNameDisp">${myData.displayName}</div>
        <div class="my-av-email">${myData.email}</div>
      </div>
    </div>
    <div class="fgroup"><div class="flabel">Display name</div><input class="finput" id="pName" value="${myData.displayName||''}" placeholder="Your name"></div>
    <div class="section-label">My snus brands</div>
    <div class="chips-wrap" id="chipsWrap" onclick="document.getElementById('chipInp').focus()">
      <input class="chip-inp" id="chipInp" placeholder="Type brand + Enter" onkeydown="addChip(event)">
    </div>
    <div class="section-label">Availability</div>
    <div class="avail-grid">
      <button class="avail-opt${pAvail==='available'?' sel-available':''}" onclick="setAvail(this,'available')"><span class="avail-icon">✅</span>Got plenty</button>
      <button class="avail-opt${pAvail==='maybe'?' sel-maybe':''}" onclick="setAvail(this,'maybe')"><span class="avail-icon">🟡</span>Running low</button>
      <button class="avail-opt${pAvail==='needsnus'?' sel-needsnus':''}" onclick="setAvail(this,'needsnus')"><span class="avail-icon">🙏</span>Need snus</button>
      <button class="avail-opt${pAvail==='empty'?' sel-empty':''}" onclick="setAvail(this,'empty')"><span class="avail-icon">❌</span>Empty</button>
    </div>
    <div class="section-label">Stock level</div>
    <div class="stock-wrap">
      <input type="range" class="stock-sl" id="stockSl" min="0" max="100" step="1" value="${myData.stock||0}" oninput="document.getElementById('stockVal').textContent=this.value+'%'">
      <div class="stock-meta"><span>Empty</span><span id="stockVal">${myData.stock||0}%</span><span>Full</span></div>
    </div>
    <button class="save-btn" onclick="saveProfile()">Save profile</button>
    <div class="saved-flash" id="savedFlash">Saved! ✓</div>
    <button class="signout-btn" onclick="doSignOut()">Sign out</button>
  `;
  renderChips();
}

function renderChips(){
  const f=document.getElementById('chipsWrap');if(!f)return;
  const inp=document.getElementById('chipInp');
  f.innerHTML='';
  pBrands.forEach((b,i)=>{
    const ch=document.createElement('div');ch.className='chip';
    ch.innerHTML=`${b}<button class="chip-x" onclick="rmChip(${i})">×</button>`;
    f.appendChild(ch);
  });
  const ni=inp||Object.assign(document.createElement('input'),{className:'chip-inp',id:'chipInp',placeholder:'Type brand + Enter'});
  ni.setAttribute('onkeydown','addChip(event)');
  f.appendChild(ni);
}
window.addChip=function(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const v=e.target.value.trim().replace(/,$/,'');
    if(v&&!pBrands.includes(v)){pBrands.push(v);e.target.value='';renderChips();}
  }
};
window.rmChip=function(i){pBrands.splice(i,1);renderChips();};
window.setAvail=function(btn,a){
  pAvail=a;
  document.querySelectorAll('.avail-grid .avail-opt').forEach(b=>b.className='avail-opt');
  btn.className='avail-opt sel-'+a;
};
window.saveProfile=async function(){
  const name=document.getElementById('pName')?.value.trim();
  const stock=parseInt(document.getElementById('stockSl')?.value||0);
  if(!name)return;
  try{
    await db.collection('users').doc(me.uid).update({
      displayName:name,brands:pBrands,availability:pAvail,stock,
      lastSeen:firebase.firestore.FieldValue.serverTimestamp()
    });
    const f=document.getElementById('savedFlash');
    if(f){f.classList.add('on');setTimeout(()=>f.classList.remove('on'),2500);}
    document.getElementById('pNameDisp').textContent=name;
  }catch(e){alert('Save failed: '+e.message);}
};
window.doSignOut=async function(){teardown();await firebase.auth().signOut();};

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
function showAuth(){
  document.getElementById('authWrap').style.display='flex';
  document.getElementById('shell').style.display='none';
  renderLoginForm();
}
window.authTab=function(tab){
  document.querySelectorAll('.tab-btn').forEach((t,i)=>t.classList.toggle('on',['login','register'][i]===tab));
  tab==='login'?renderLoginForm():renderRegForm();
};
function renderLoginForm(){
  document.getElementById('authForm').innerHTML=`
    <div class="fgroup"><div class="flabel">Email</div><input class="finput" id="aEmail" type="email" placeholder="you@email.com" autocomplete="email"></div>
    <div class="fgroup"><div class="flabel">Password</div><input class="finput" id="aPw" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="aerr" id="aErr"></div>
    <button class="abtn" onclick="doLogin()">Sign in</button>`;
}
function renderRegForm(){
  document.getElementById('authForm').innerHTML=`
    <div class="fgroup"><div class="flabel">Name</div><input class="finput" id="aName" type="text" placeholder="Your name" autocomplete="name"></div>
    <div class="fgroup"><div class="flabel">Email</div><input class="finput" id="aEmail" type="email" placeholder="you@email.com" autocomplete="email"></div>
    <div class="fgroup"><div class="flabel">Password</div><input class="finput" id="aPw" type="password" placeholder="Min 6 characters" autocomplete="new-password"></div>
    <div class="aerr" id="aErr"></div>
    <button class="abtn" onclick="doRegister()">Create account</button>`;
}
window.doLogin=async function(){
  const e=document.getElementById('aEmail').value.trim();
  const p=document.getElementById('aPw').value;
  const err=document.getElementById('aErr');
  const btn=document.querySelector('.abtn');
  btn.disabled=true;btn.textContent='Signing in…';err.style.display='none';
  try{await firebase.auth().signInWithEmailAndPassword(e,p);}
  catch(ex){err.textContent=authErrMsg(ex.code);err.style.display='block';btn.disabled=false;btn.textContent='Sign in';}
};
window.doRegister=async function(){
  const name=document.getElementById('aName')?.value.trim();
  const e=document.getElementById('aEmail').value.trim();
  const p=document.getElementById('aPw').value;
  const err=document.getElementById('aErr');
  const btn=document.querySelector('.abtn');
  if(!name){err.textContent='Please enter your name.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Creating account…';err.style.display='none';
  try{
    const cred=await firebase.auth().createUserWithEmailAndPassword(e,p);
    await cred.user.updateProfile({displayName:name});
    await db.collection('users').doc(cred.user.uid).set({
      uid:cred.user.uid,displayName:name,email:e,
      brands:[],availability:'empty',stock:0,location:null,friends:[],
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }catch(ex){err.textContent=authErrMsg(ex.code);err.style.display='block';btn.disabled=false;btn.textContent='Create account';}
};
function authErrMsg(code){
  return({'auth/invalid-email':'Invalid email.','auth/user-not-found':'No account found.','auth/wrong-password':'Wrong password.','auth/email-already-in-use':'Account already exists.','auth/weak-password':'Password must be 6+ characters.','auth/invalid-credential':'Wrong email or password.','auth/too-many-requests':'Too many attempts, wait a moment.'})[code]||'Something went wrong.';
}

// ═══════════════════════════════════════
// TOAST & NOTIFICATIONS
// ═══════════════════════════════════════
function showToast(name, type){
  const msgs={ping:'📡 ',need:'🙏 '};
  const suffixes={ping:' wants snus!',need:' needs snus!'};
  document.getElementById('toastName').textContent=name;
  const t=document.getElementById('toast');
  t.innerHTML=(msgs[type]||'📡 ')+'<span class="toast-name">'+name+'</span>'+(suffixes[type]||' pinged you!');
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),4500);
}
function showPingBadge(){
  document.getElementById('pingBadge').classList.add('on');
  document.getElementById('friendsDot').classList.add('on');
}
window.clearPingBadge=function(){document.getElementById('pingBadge').classList.remove('on');};

  {featureType:'poi',stylers:[{visibility:'off'}]},
  {featureType:'transit',stylers:[{visibility:'off'}]},
  {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#323640'}]},

];}
